<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Evento — Quinta Ko'ox Tanil</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: #f5f3ef; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .login-container { width: 100%; max-width: 420px; }
        
        .logo-section { background: #F5C518; border-radius: 16px 16px 0 0; padding: 30px; text-align: center; }
        .logo-section img { max-width: 180px; height: auto; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15)); }
        
        .form-section { background: white; border-radius: 0 0 16px 16px; padding: 32px 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .form-title { font-size: 20px; font-weight: 700; color: #2c2b28; margin-bottom: 6px; }
        .form-subtitle { font-size: 14px; color: #8a8780; margin-bottom: 24px; }
        
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .field input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; font-family: 'IBM Plex Sans', sans-serif; transition: border-color 0.2s; }
        .field input:focus { outline: none; border-color: #2E7D32; box-shadow: 0 0 0 3px rgba(46,125,50,0.1); }
        .field .hint { font-size: 11px; color: #aaa; margin-top: 4px; }
        
        .btn-submit { width: 100%; padding: 14px; background: #2E7D32; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; transition: background 0.2s; }
        .btn-submit:hover { background: #388E3C; }
        
        .error-msg { background: #ffebee; color: #c62828; padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 18px; border-left: 4px solid #e74c3c; }
        
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #aaa; }
        .footer a { color: #2E7D32; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="/static/img/logo.png" alt="Quinta Ko'ox Tanil">
        </div>
        
        <div class="form-section">
            <div class="form-title">Consulta tu evento</div>
            <div class="form-subtitle">Ingresa tus datos para ver los detalles de tu cotización</div>
            
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                <div class="field">
                    <label>Código de cotización</label>
                    <input type="text" name="codigo" placeholder="Ej: 7, 007 o COT-007" required autofocus>
                    <div class="hint">Lo encuentras en tu cotización o en el mensaje que te enviamos</div>
                </div>
                <div class="field">
                    <label>Últimos 4 dígitos de tu teléfono</label>
                    <input type="text" name="telefono" placeholder="Ej: 4523" maxlength="4" pattern="\d{4}" required inputmode="numeric">
                    <div class="hint">El teléfono con el que te registraste</div>
                </div>
                <button type="submit" class="btn-submit">Ver mi evento</button>
            </form>
        </div>
        
        <div class="footer">
            <a href="https://wa.me/529999999999">¿Necesitas ayuda? Escríbenos</a>
        </div>
    </div>
</body>
</html>
