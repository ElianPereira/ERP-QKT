{% extends "admin/base_site.html" %}
{% load static %}

{% block content %}
<div class="col-md-6 offset-md-3" style="margin-top: 40px;">
    <div class="card">
        <div class="card-header" style="background-color: #2E7D32; color: white;">
            <h3 class="card-title mb-0">{{ titulo|default:"Generar reporte" }}</h3>
        </div>
        <div class="card-body">
            <form method="post" action="">
                {% csrf_token %}

                <div class="form-group">
                    <label>Fecha inicial</label>
                    <input type="date" name="fecha_inicio" id="fecha_inicio" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Fecha final</label>
                    <input type="date" name="fecha_fin" id="fecha_fin" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Filtrar por estado</label>
                    <select name="estado" class="form-control">
                        <option value="TODAS">-- Todos los estados --</option>
                        <option value="CONFIRMADA">Confirmadas</option>
                        <option value="BORRADOR">Borradores</option>
                        <option value="CANCELADA">Canceladas</option>
                    </select>
                    <small>Nota: Para "Lista de Compras", el sistema tomará automáticamente solo las confirmadas.</small>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-block btn-lg" style="background:#2E7D32; color:white; border:none;">
                        Generar documento
                    </button>
                    <a href="{% url 'admin:index' %}" class="btn btn-block" style="background:#4a4845; color:#d4d1c8; border:none; margin-top:8px;">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    var date = new Date();
    var firstDay = new Date(date.getFullYear(), date.getMonth(), 1);
    var lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0);
    function formatDate(d) {
        let month = '' + (d.getMonth() + 1), day = '' + d.getDate(), year = d.getFullYear();
        if (month.length < 2) month = '0' + month;
        if (day.length < 2) day = '0' + day;
        return [year, month, day].join('-');
    }
    document.getElementById("fecha_inicio").value = formatDate(firstDay);
    document.getElementById("fecha_fin").value = formatDate(lastDay);
</script>
{% endblock %}
