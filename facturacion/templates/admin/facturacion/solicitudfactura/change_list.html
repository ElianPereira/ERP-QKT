{% extends "admin/change_list.html" %}

{% block extrahead %}
{{ block.super }}
<script>
function marcarEnviada(solicitudId, metodo) {
    // Llamar al endpoint para marcar como enviada después de abrir WhatsApp
    fetch(`/admin/facturacion/solicitudfactura/${solicitudId}/marcar_enviada/?metodo=${metodo}`)
        .then(response => response.json())
        .then(data => {
            if (data.status === 'ok') {
                // Recargar la página después de 2 segundos para actualizar el estado
                setTimeout(() => location.reload(), 2000);
            }
        })
        .catch(err => console.error('Error:', err));
}
</script>
<style>
/* Estilos adicionales para botones de acción en la tabla */
#result_list td a.btn {
    text-decoration: none !important;
    display: inline-block;
    margin: 2px 0;
}
#result_list td a.btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}
</style>
{% endblock %}

{% block content %}
<div style="margin-bottom: 20px; padding: 15px; background: #383632; border-radius: 8px; border-left: 4px solid #F5C518;">
    <h3 style="margin: 0 0 10px 0; color: #F5C518; font-size: 14px;">📋 Flujo de Facturación</h3>
    <p style="margin: 0; color: #d4d1c8; font-size: 13px;">
        <strong style="color:#e67e22;">PENDIENTE</strong> → Enviar por 
        <span style="color:#25D366;">WhatsApp</span> o 
        <span style="color:#3498db;">Email</span> → 
        <strong style="color:#3498db;">ENVIADA</strong> → Subir ZIP/PDF → 
        <strong style="color:#27ae60;">FACTURADA ✓</strong>
    </p>
</div>
{{ block.super }}
{% endblock %}
